substitutions:
  # — Device / Model -
  device_name: "tylo"
  model_name: "combi" # pure | combi | elite | combi_elite
  branch_ref: "main" # main | dev

  # — Area & Logging —
  area_name: "Sauna"
  log_level: "INFO"

  # — Board / Flash (configurable) —
  board_type: "esp32-s3-devkitc-1" # bare ESP32-S3 module (Waveshare ESP32-S3-RS485-CAN)
  flash_size: "16MB" # per Waveshare spec sheet: 16MB Flash
  led_brightness_connected: "0" # 0 = OFF — this board has no onboard RGB LED

  # — UART pins (Waveshare ESP32-S3-RS485-CAN silkscreen pinout) —
  uart_tx_pin: "GPIO17"
  uart_rx_pin: "GPIO18"

  # — Defaults for bath/temperature —
  default_bath_temperature: "92"
  default_bath_time: "240"
  default_max_bath_temperature: "110"

  # — Defaults for Humidity settings (COMBI uses humidity_step) —
  default_humidity_step: "0"      # 0..10 - COMBI
  default_humidity_percent: "0"   # 0..100 - COMBI_ELITE

  # — Temperature limits —
  min_temp_c: "40"
  max_temp_c: "110"

  # — Secrets from secrets.yaml —
  api_encryption_key: !secret api_key_sauna
  ota_password:       !secret ota_pass_sauna
  wifi_ssid_sub:      !secret wifi_ssid
  wifi_password_sub:  !secret wifi_password

esphome:
  name: ${device_name}
  friendly_name: ${device_name}
  comment: ${device_name} sauna controller

esp32:
  board: ${board_type}
  flash_size: ${flash_size}
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/masadams/esphome-tylo
      ref: ${branch_ref}
    refresh: 1s
    components: [ sauna360 ]

packages:
  base:
    url: https://github.com/masadams/esphome-tylo
    ref: main
    refresh: 1s
    files: ["packages/base.yaml"]

  led:
    url: https://github.com/masadams/esphome-tylo
    ref: main
    refresh: 1s
    files: ["packages/led.yaml"]

  model:
    url: https://github.com/masadams/esphome-tylo
    ref: main
    refresh: 1s
    files: ["models/combi.yaml"] # pure | combi | elite | combi_elite
